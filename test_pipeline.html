<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rigchecker — Full Pipeline Test</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1a1a2e; color: #e8e8f0; font-family: 'Noto Sans JP', sans-serif; overflow: hidden; }
  #canvas { width: 100vw; height: 100vh; display: block; }
  #panel {
    position: absolute; top: 12px; left: 12px;
    background: rgba(0,0,0,0.8); padding: 14px 18px; border-radius: 8px;
    font-size: 12px; line-height: 1.8; max-width: 340px;
    font-family: 'Space Mono', monospace;
  }
  #panel h3 { font-size: 14px; margin-bottom: 8px; color: #e94560; }
  .st { color: #9999bb; margin-bottom: 2px; }
  .st.ok { color: #4ecdc4; }
  .st.err { color: #ff6b6b; }
  .st.working { color: #f9ca24; }
  .btn {
    display: inline-block; margin: 6px 4px 0 0; padding: 8px 16px;
    background: #e94560; color: #fff; border: none; border-radius: 6px;
    font-size: 11px; font-weight: 700; cursor: pointer; font-family: inherit;
  }
  .btn:hover { background: #ff6b6b; }
  .btn:disabled { background: #333; color: #666; cursor: not-allowed; }
  .btn.anim { background: #222244; border: 1px solid #444; }
  .btn.anim:hover { background: #2a2a5a; }
  .btn.anim.active { background: rgba(233,69,96,0.2); border-color: #e94560; color: #e94560; }
  #file-input { display: none; }
  .anim-row { margin-top: 10px; display: none; flex-wrap: wrap; gap: 4px; }
  .anim-row.visible { display: flex; }
  .separator { height: 1px; background: #333; margin: 10px 0; }
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<div id="panel">
  <h3>Full Pipeline Test</h3>
  <div class="st" id="st-ref">1. Reference: loading...</div>
  <div class="st" id="st-model">2. Model: —</div>
  <div class="st" id="st-fit">3. Fit: —</div>
  <div class="st" id="st-skin">4. Skin: —</div>
  <div class="st" id="st-anim">5. Anim: —</div>
  <div class="separator"></div>
  <button class="btn" id="btn-upload">モデルをアップロード</button>
  <button class="btn" id="btn-rig" disabled>リグ生成＋スキニング</button>
  <input type="file" id="file-input" accept=".fbx">
  <div class="anim-row" id="anim-row">
    <button class="btn anim" data-anim="Breathing Idle">Idle</button>
    <button class="btn anim" data-anim="Shopping Cart Dance">Dance1</button>
    <button class="btn anim" data-anim="Northern Soul Spin Combo">Dance2</button>
    <button class="btn anim" data-anim="Walking">Walk</button>
    <button class="btn anim" data-anim="Standing Jump">Jump</button>
    <button class="btn anim" data-anim="Waving">Wave</button>
  </div>
  <div class="separator"></div>
  <div class="st" id="st-debug">Debug: —</div>
  <button class="btn" id="btn-pause" style="display:none;background:#2a5a2a">⏸ 一時停止</button>
  <button class="btn" id="btn-normal" style="display:none;background:#444">法線カラー切替</button>
  <button class="btn" id="btn-wireframe" style="display:none;background:#444">ワイヤーフレーム切替</button>
</div>

<script type="importmap">
{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"}}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { FBXLoader } from 'three/addons/loaders/FBXLoader.js';

// ── FBX patch for Nomad ──
const _origParse = FBXLoader.prototype.parse;
FBXLoader.prototype.parse = function(buffer, path) {
  try { return _origParse.call(this, buffer, path); }
  catch(err) {
    if (err.message && err.message.includes('MappingInformationType')) {
      console.warn('[patch] Neutralizing LayerElementColor');
      const bytes = new Uint8Array(buffer instanceof ArrayBuffer ? buffer : buffer.buffer || buffer);
      const needle = [76,97,121,101,114,69,108,101,109,101,110,116,67,111,108,111,114];
      for (let i = 0; i < bytes.length - needle.length; i++) {
        let m = true;
        for (let j = 0; j < needle.length; j++) { if (bytes[i+j] !== needle[j]) { m = false; break; } }
        if (m) bytes[i + 12] = 88;
      }
      return _origParse.call(this, bytes.buffer, path);
    }
    throw err;
  }
};

// ── Scene ──
const canvas = document.getElementById('canvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setClearColor(0x1a1a2e);
renderer.setSize(window.innerWidth, window.innerHeight);

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.01, 100);
camera.position.set(0, 1, 3);

const controls = new OrbitControls(camera, canvas);
controls.enableDamping = true;
controls.target.set(0, 1, 0);

scene.add(new THREE.AmbientLight(0x404060, 1.5));
scene.add(new THREE.DirectionalLight(0xffffff, 2).translateX(3).translateY(5).translateZ(4));
scene.add(new THREE.DirectionalLight(0x4488cc, 0.6).translateX(-3).translateY(2).translateZ(-2));
scene.add(new THREE.GridHelper(6, 12, 0x333355, 0x222244));
scene.add(new THREE.AxesHelper(1));  // R=X, G=Y, B=Z

const clock = new THREE.Clock();

// ── State ──
let refData = null;        // { object, bones[], rootBone, totalHeight, minY, hipsY }
let userModelObj = null;   // THREE.Object3D
let userMeshes = [];       // THREE.Mesh[]
let skinnedMesh = null;
let skelHelper = null;
let mixer = null;
let currentAction = null;
let fitScale = 1;
let fitYOffset = 0;
let originalBindHipsPos = new THREE.Vector3(0, 1, 0); // captured once at bind time
const animClips = {};

const st = key => document.getElementById('st-' + key);

// ══════════════════════════════════
//  STEP 1: Load reference skeleton
// ══════════════════════════════════
new FBXLoader().load('T-Pose.fbx',
  (object) => {
    object.updateMatrixWorld(true);

    // Deduplicate bones
    const bones = [];
    const seen = new Set();
    object.traverse(c => {
      if (c.isBone) {
        const wp = new THREE.Vector3(); c.getWorldPosition(wp);
        const key = c.name + '|' + wp.x.toFixed(1) + '|' + wp.y.toFixed(1) + '|' + wp.z.toFixed(1);
        if (!seen.has(key)) { seen.add(key); bones.push(c); }
      }
    });

    const rootBone = bones.find(b => !b.parent?.isBone);
    let minY = Infinity, maxY = -Infinity;
    bones.forEach(b => {
      const wp = new THREE.Vector3(); b.getWorldPosition(wp);
      if (wp.y < minY) minY = wp.y;
      if (wp.y > maxY) maxY = wp.y;
    });
    const hipsWP = new THREE.Vector3(); rootBone.getWorldPosition(hipsWP);

    refData = { object, bones, rootBone, totalHeight: maxY - minY, minY, maxY, hipsY: hipsWP.y };

    st('ref').textContent = `1. Reference: OK (${bones.length} bones, ${refData.totalHeight.toFixed(0)}cm)`;
    st('ref').className = 'st ok';
    document.getElementById('btn-rig').disabled = true;
    console.log('Reference loaded:', refData);
  },
  undefined,
  (err) => { st('ref').textContent = '1. Reference: FAILED'; st('ref').className = 'st err'; }
);

// ══════════════════════════════════
//  STEP 2: Upload user model
// ══════════════════════════════════
document.getElementById('btn-upload').addEventListener('click', () => document.getElementById('file-input').click());
document.getElementById('file-input').addEventListener('change', e => {
  if (e.target.files.length) loadUserModel(e.target.files[0]);
});

function loadUserModel(file) {
  st('model').textContent = '2. Model: loading...';
  st('model').className = 'st working';

  const reader = new FileReader();
  reader.onload = e => {
    try {
      const object = new FBXLoader().parse(e.target.result);
      if (userModelObj) scene.remove(userModelObj);
      if (skinnedMesh) { scene.remove(skinnedMesh); skinnedMesh = null; }
      if (skelHelper) { scene.remove(skelHelper); skelHelper = null; }

      userModelObj = object;
      userMeshes = [];

      // Normalize
      const box = new THREE.Box3().setFromObject(object);
      const size = box.getSize(new THREE.Vector3());
      const scale = 2.0 / Math.max(size.x, size.y, size.z);
      object.scale.multiplyScalar(scale);
      box.setFromObject(object);
      const center = box.getCenter(new THREE.Vector3());
      object.position.sub(center);
      box.setFromObject(object);
      object.position.y -= box.min.y;

      object.traverse(c => {
        if (c.isMesh) {
          userMeshes.push(c);
          if (!c.geometry.attributes.normal) c.geometry.computeVertexNormals();
          c.material = new THREE.MeshStandardMaterial({
            color: 0x8888aa, roughness: 0.6, metalness: 0.1, side: THREE.DoubleSide,
          });
        }
      });

      scene.add(object);
      box.setFromObject(object);
      const h = box.getSize(new THREE.Vector3()).y;
      controls.target.set(0, h * 0.45, 0);
      camera.position.set(0, h * 0.5, h * 1.5);

      st('model').textContent = `2. Model: OK (${file.name}, ${userMeshes.length} mesh)`;
      st('model').className = 'st ok';
      document.getElementById('btn-rig').disabled = !refData;
    } catch (err) {
      st('model').textContent = '2. Model: ERROR — ' + err.message;
      st('model').className = 'st err';
      console.error(err);
    }
  };
  reader.readAsArrayBuffer(file);
}

// ══════════════════════════════════
//  STEP 3 + 4: Fit + Skin
// ══════════════════════════════════
document.getElementById('btn-rig').addEventListener('click', () => {
  if (!refData || !userModelObj) return;

  st('fit').textContent = '3. Fit: processing...';
  st('fit').className = 'st working';

  setTimeout(() => {
    try {
      // ── 3. FIT: scale + position the reference skeleton ──
      const modelBox = new THREE.Box3().setFromObject(userModelObj);
      const modelH = modelBox.getSize(new THREE.Vector3()).y;

      // Scale: model height / reference height
      fitScale = modelH / refData.totalHeight;

      // Build world positions of ALL reference bones (scaled + repositioned)
      const refFeetY = refData.minY * fitScale;
      const yOffset = -refFeetY; // align feet to ground
      fitYOffset = yOffset;

      const boneWorldPositions = {};  // boneName → Vector3
      const boneWorldQuats = {};      // boneName → Quaternion

      refData.object.updateMatrixWorld(true);

      refData.bones.forEach(bone => {
        const wp = new THREE.Vector3();
        bone.getWorldPosition(wp);
        // Apply scale and offset
        wp.multiplyScalar(fitScale);
        wp.y += yOffset;
        boneWorldPositions[bone.name] = wp;

        const wq = new THREE.Quaternion();
        bone.getWorldQuaternion(wq);
        boneWorldQuats[bone.name] = wq;
      });

      st('fit').textContent = `3. Fit: OK (scale=${fitScale.toFixed(5)})`;
      st('fit').className = 'st ok';

      // ── 4. SKIN: create SkinnedMesh ──
      st('skin').textContent = '4. Skin: processing...';
      st('skin').className = 'st working';

      // Clone bone hierarchy from reference
      const clonedRoot = refData.rootBone.clone(true);

      // Scale the cloned skeleton
      clonedRoot.position.multiplyScalar(fitScale);
      clonedRoot.traverse(child => {
        if (child.isBone && child !== clonedRoot) {
          child.position.multiplyScalar(fitScale);
        }
      });
      // Offset Y so feet touch ground
      clonedRoot.position.y += yOffset;

      // Fix ③: Center skeleton Z on model's bounding box center Z
      const modelCenter = modelBox.getCenter(new THREE.Vector3());
      clonedRoot.position.z = modelCenter.z;

      clonedRoot.updateMatrixWorld(true);

      // Fix ②: Fine-tune Y position — find actual lowest bone and ensure it's at ground
      let lowestBoneY = Infinity;
      clonedRoot.traverse(c => {
        if (c.isBone) {
          const wp = new THREE.Vector3(); c.getWorldPosition(wp);
          if (wp.y < lowestBoneY) lowestBoneY = wp.y;
        }
      });
      if (Math.abs(lowestBoneY) > 0.001) {
        console.log(`[FIT] Correcting Y by ${(-lowestBoneY).toFixed(4)} (lowest bone was at ${lowestBoneY.toFixed(4)})`);
        clonedRoot.position.y -= lowestBoneY;
        clonedRoot.updateMatrixWorld(true);
      }

      // Collect cloned bones in consistent order
      const clonedBones = [];
      clonedRoot.traverse(c => { if (c.isBone) clonedBones.push(c); });

      // Build world positions from cloned bones
      const bwp = clonedBones.map(b => {
        const v = new THREE.Vector3(); b.getWorldPosition(v); return v;
      });

      // Create skeleton
      const skeleton = new THREE.Skeleton(clonedBones);

      // Merge user model geometries
      userModelObj.updateMatrixWorld(true);
      const geos = [];
      userModelObj.traverse(c => {
        if (c.isMesh && c.geometry) {
          const g = c.geometry.clone();
          g.applyMatrix4(c.matrixWorld);
          if (!g.attributes.normal) g.computeVertexNormals();
          geos.push(g);
        }
      });

      // Manual merge
      let totalV = 0, totalI = 0;
      for (const g of geos) { totalV += g.attributes.position.count; if (g.index) totalI += g.index.count; }
      const posArr = new Float32Array(totalV * 3);
      const nrmArr = new Float32Array(totalV * 3);
      const idxArr = totalI > 0 ? new Uint32Array(totalI) : null;
      let vo = 0, io = 0, vertOff = 0;
      for (const g of geos) {
        const p = g.attributes.position;
        for (let i = 0; i < p.count * 3; i++) posArr[vo + i] = p.array[i];
        if (g.attributes.normal) { const n = g.attributes.normal; for (let i = 0; i < n.count * 3; i++) nrmArr[vo + i] = n.array[i]; }
        if (g.index && idxArr) { for (let i = 0; i < g.index.count; i++) idxArr[io + i] = g.index.array[i] + vertOff; io += g.index.count; }
        vertOff += p.count; vo += p.count * 3;
      }
      const geo = new THREE.BufferGeometry();
      geo.setAttribute('position', new THREE.BufferAttribute(posArr, 3));
      geo.setAttribute('normal', new THREE.BufferAttribute(nrmArr, 3));
      if (idxArr) geo.setIndex(new THREE.BufferAttribute(idxArr, 1));

      // Compute skin weights — BONE SEGMENT DISTANCE method
      // Instead of distance to bone POINT, use distance to bone LINE SEGMENT
      // This creates cylindrical influence regions along each bone

      const SKIN_BONE_NAMES = new Set([
        'mixamorigHips',
        'mixamorigSpine', 'mixamorigSpine1', 'mixamorigSpine2',
        'mixamorigNeck', 'mixamorigHead',
        'mixamorigLeftShoulder', 'mixamorigLeftArm', 'mixamorigLeftForeArm', 'mixamorigLeftHand',
        'mixamorigRightShoulder', 'mixamorigRightArm', 'mixamorigRightForeArm', 'mixamorigRightHand',
        'mixamorigLeftUpLeg', 'mixamorigLeftLeg', 'mixamorigLeftFoot', 'mixamorigLeftToeBase',
        'mixamorigRightUpLeg', 'mixamorigRightLeg', 'mixamorigRightFoot', 'mixamorigRightToeBase',
        // Fingers
        'mixamorigLeftHandThumb1','mixamorigLeftHandThumb2','mixamorigLeftHandThumb3',
        'mixamorigLeftHandIndex1','mixamorigLeftHandIndex2','mixamorigLeftHandIndex3',
        'mixamorigLeftHandMiddle1','mixamorigLeftHandMiddle2','mixamorigLeftHandMiddle3',
        'mixamorigLeftHandRing1','mixamorigLeftHandRing2','mixamorigLeftHandRing3',
        'mixamorigLeftHandPinky1','mixamorigLeftHandPinky2','mixamorigLeftHandPinky3',
        'mixamorigRightHandThumb1','mixamorigRightHandThumb2','mixamorigRightHandThumb3',
        'mixamorigRightHandIndex1','mixamorigRightHandIndex2','mixamorigRightHandIndex3',
        'mixamorigRightHandMiddle1','mixamorigRightHandMiddle2','mixamorigRightHandMiddle3',
        'mixamorigRightHandRing1','mixamorigRightHandRing2','mixamorigRightHandRing3',
        'mixamorigRightHandPinky1','mixamorigRightHandPinky2','mixamorigRightHandPinky3',
      ]);

      // Define each bone's segment endpoint (bone → child)
      const BONE_CHILD_MAP = {
        mixamorigHips: 'mixamorigSpine',
        mixamorigSpine: 'mixamorigSpine1',
        mixamorigSpine1: 'mixamorigSpine2',
        mixamorigSpine2: 'mixamorigNeck',
        mixamorigNeck: 'mixamorigHead',
        mixamorigHead: 'mixamorigHeadTop_End',
        mixamorigLeftShoulder: 'mixamorigLeftArm',
        mixamorigLeftArm: 'mixamorigLeftForeArm',
        mixamorigLeftForeArm: 'mixamorigLeftHand',
        mixamorigLeftHand: 'mixamorigLeftHandMiddle1',
        mixamorigRightShoulder: 'mixamorigRightArm',
        mixamorigRightArm: 'mixamorigRightForeArm',
        mixamorigRightForeArm: 'mixamorigRightHand',
        mixamorigRightHand: 'mixamorigRightHandMiddle1',
        mixamorigLeftUpLeg: 'mixamorigLeftLeg',
        mixamorigLeftLeg: 'mixamorigLeftFoot',
        mixamorigLeftFoot: 'mixamorigLeftToeBase',
        mixamorigLeftToeBase: null,
        mixamorigRightUpLeg: 'mixamorigRightLeg',
        mixamorigRightLeg: 'mixamorigRightFoot',
        mixamorigRightFoot: 'mixamorigRightToeBase',
        mixamorigRightToeBase: null,
        // Left fingers
        mixamorigLeftHandThumb1:'mixamorigLeftHandThumb2', mixamorigLeftHandThumb2:'mixamorigLeftHandThumb3', mixamorigLeftHandThumb3:null,
        mixamorigLeftHandIndex1:'mixamorigLeftHandIndex2', mixamorigLeftHandIndex2:'mixamorigLeftHandIndex3', mixamorigLeftHandIndex3:null,
        mixamorigLeftHandMiddle1:'mixamorigLeftHandMiddle2', mixamorigLeftHandMiddle2:'mixamorigLeftHandMiddle3', mixamorigLeftHandMiddle3:null,
        mixamorigLeftHandRing1:'mixamorigLeftHandRing2', mixamorigLeftHandRing2:'mixamorigLeftHandRing3', mixamorigLeftHandRing3:null,
        mixamorigLeftHandPinky1:'mixamorigLeftHandPinky2', mixamorigLeftHandPinky2:'mixamorigLeftHandPinky3', mixamorigLeftHandPinky3:null,
        // Right fingers
        mixamorigRightHandThumb1:'mixamorigRightHandThumb2', mixamorigRightHandThumb2:'mixamorigRightHandThumb3', mixamorigRightHandThumb3:null,
        mixamorigRightHandIndex1:'mixamorigRightHandIndex2', mixamorigRightHandIndex2:'mixamorigRightHandIndex3', mixamorigRightHandIndex3:null,
        mixamorigRightHandMiddle1:'mixamorigRightHandMiddle2', mixamorigRightHandMiddle2:'mixamorigRightHandMiddle3', mixamorigRightHandMiddle3:null,
        mixamorigRightHandRing1:'mixamorigRightHandRing2', mixamorigRightHandRing2:'mixamorigRightHandRing3', mixamorigRightHandRing3:null,
        mixamorigRightHandPinky1:'mixamorigRightHandPinky2', mixamorigRightHandPinky2:'mixamorigRightHandPinky3', mixamorigRightHandPinky3:null,
      };

      // Build bone name → world position map (for all bones, not just skin set)
      const allBoneWP = {};
      clonedBones.forEach((b, idx) => { allBoneWP[b.name] = bwp[idx]; });

      // Build skin bone list with segments
      const skinBones = [];
      clonedBones.forEach((b, idx) => {
        if (!SKIN_BONE_NAMES.has(b.name)) return;
        const start = bwp[idx];
        const childName = BONE_CHILD_MAP[b.name];
        let end;
        if (childName && allBoneWP[childName]) {
          end = allBoneWP[childName];
        } else {
          // Leaf bone: extend segment slightly in the direction from parent
          const parent = b.parent;
          if (parent && parent.isBone) {
            const parentWP = new THREE.Vector3(); parent.getWorldPosition(parentWP);
            const dir = start.clone().sub(parentWP).normalize();
            end = start.clone().add(dir.multiplyScalar(0.05));
          } else {
            end = start.clone();
          }
        }
        skinBones.push({ idx, start, end, name: b.name });
      });
      console.log(`Skinning with ${skinBones.length} bone segments`);

      // Distance from point to line segment
      const _ab = new THREE.Vector3();
      const _ap = new THREE.Vector3();
      const _closest = new THREE.Vector3();
      function distToSegment(point, segStart, segEnd) {
        _ab.copy(segEnd).sub(segStart);
        _ap.copy(point).sub(segStart);
        const abLen2 = _ab.dot(_ab);
        if (abLen2 < 0.00001) return point.distanceTo(segStart); // degenerate segment
        const t = Math.max(0, Math.min(1, _ap.dot(_ab) / abLen2));
        _closest.copy(segStart).addScaledVector(_ab, t);
        return point.distanceTo(_closest);
      }

      const vCount = posArr.length / 3;
      const si = new Uint16Array(vCount * 4);
      const sw = new Float32Array(vCount * 4);
      const tv = new THREE.Vector3();

      for (let i = 0; i < vCount; i++) {
        tv.set(posArr[i * 3], posArr[i * 3 + 1], posArr[i * 3 + 2]);

        // Distance to each bone SEGMENT, with zone-based bias
        const ds = skinBones.map(sb => {
          let d = distToSegment(tv, sb.start, sb.end);

          // ── Fix ③: Zone-based bias to prevent arm↔torso bleeding ──
          // If vertex is near the midline (|x| < shoulder width * 0.4),
          // penalize arm/shoulder bones to keep torso clean
          const absX = Math.abs(tv.x);
          const isArmBone = sb.name.includes('Shoulder') || sb.name.includes('Arm') ||
                            sb.name.includes('ForeArm') || sb.name.includes('Hand') ||
                            sb.name.includes('Thumb') || sb.name.includes('Index') ||
                            sb.name.includes('Middle') || sb.name.includes('Ring') ||
                            sb.name.includes('Pinky');
          const isLegBone = sb.name.includes('UpLeg') || sb.name.includes('Leg') ||
                            sb.name.includes('Foot') || sb.name.includes('Toe');
          const isSpineBone = sb.name.includes('Spine') || sb.name.includes('Hips') ||
                              sb.name.includes('Neck') || sb.name.includes('Head');

          if (isArmBone && absX < 0.15) {
            d *= 2.5;  // penalize arm bones near midline
          }
          // Prevent spine bones from affecting limb vertices too much
          if (isSpineBone && absX > 0.3 && tv.y > 0.5) {
            d *= 1.5;
          }

          return { idx: sb.idx, d, name: sb.name };
        }).sort((a, b) => a.d - b.d).slice(0, 4);

        // TUNABLE PARAMETERS
        const POWER = 1.5;
        const MIN_NEAREST_WEIGHT = 0.6;
        const MIN_DIST = 0.005;

        let tw = 0;
        const ws = ds.map(d => { const w = 1 / Math.pow(Math.max(d.d, MIN_DIST), POWER); tw += w; return w; });
        for (let j = 0; j < 4; j++) ws[j] /= tw;

        if (ws[0] < MIN_NEAREST_WEIGHT) {
          ws[0] = MIN_NEAREST_WEIGHT;
          const otherTotal = ws[1] + ws[2] + ws[3];
          if (otherTotal > 0.001) {
            const scale = (1 - MIN_NEAREST_WEIGHT) / otherTotal;
            ws[1] *= scale; ws[2] *= scale; ws[3] *= scale;
          }
        }

        for (let j = 0; j < 4; j++) {
          si[i * 4 + j] = ds[j].idx;
          sw[i * 4 + j] = ws[j];
        }
      }
      geo.setAttribute('skinIndex', new THREE.Uint16BufferAttribute(si, 4));
      geo.setAttribute('skinWeight', new THREE.Float32BufferAttribute(sw, 4));

      // Create SkinnedMesh
      const mat = new THREE.MeshStandardMaterial({
        color: 0x8888aa, roughness: 0.6, metalness: 0.1, side: THREE.DoubleSide,
      });
      skinnedMesh = new THREE.SkinnedMesh(geo, mat);
      skinnedMesh.add(clonedRoot);
      skinnedMesh.bind(skeleton);

      // Capture bind pose Hips position ONCE (immutable reference for all animations)
      const hipsBone = skeleton.bones.find(b => b.name === 'mixamorigHips');
      if (hipsBone) originalBindHipsPos = hipsBone.position.clone();
      console.log('Original bind Hips position (stored):', originalBindHipsPos);

      // Remove original model, add skinned mesh
      scene.remove(userModelObj);
      scene.add(skinnedMesh);

      // Skeleton helper
      if (skelHelper) scene.remove(skelHelper);
      skelHelper = new THREE.SkeletonHelper(skinnedMesh);
      scene.add(skelHelper);

      // Mixer
      mixer = new THREE.AnimationMixer(skinnedMesh);

      st('skin').textContent = `4. Skin: OK (${vCount} verts, ${clonedBones.length} bones)`;
      st('skin').className = 'st ok';

      // Show animation buttons and debug tools
      document.getElementById('anim-row').classList.add('visible');
      document.getElementById('btn-normal').style.display = 'inline-block';
      document.getElementById('btn-wireframe').style.display = 'inline-block';
      st('anim').textContent = '5. Anim: select an animation';

      // Log bone world positions for debug
      const hipsWP = new THREE.Vector3();
      clonedRoot.getWorldPosition(hipsWP);
      st('debug').textContent = `Debug: Hips=(${hipsWP.x.toFixed(3)}, ${hipsWP.y.toFixed(3)}, ${hipsWP.z.toFixed(3)})`;
      console.log('Skinning complete. Bones:', clonedBones.map(b => {
        const wp = new THREE.Vector3(); b.getWorldPosition(wp);
        return `${b.name}: (${wp.x.toFixed(3)}, ${wp.y.toFixed(3)}, ${wp.z.toFixed(3)})`;
      }));

    } catch (err) {
      st('fit').textContent = '3/4. ERROR: ' + err.message;
      st('fit').className = 'st err';
      console.error(err);
    }
  }, 50);
});

// ══════════════════════════════════
//  STEP 5: Animation
// ══════════════════════════════════
document.querySelectorAll('.btn.anim').forEach(btn => {
  btn.addEventListener('click', () => {
    const name = btn.dataset.anim;
    if (animClips[name]) { playAnim(name, btn); return; }

    st('anim').textContent = `5. Anim: loading ${name}...`;
    st('anim').className = 'st working';

    const url = `animations/${encodeURIComponent(name)}.fbx`;
    new FBXLoader().load(url,
      (obj) => {
        if (!obj.animations || !obj.animations.length) {
          st('anim').textContent = '5. Anim: no animation data in file';
          st('anim').className = 'st err';
          return;
        }
        const srcClip = obj.animations[0];

        // Retarget tracks
        const tracks = [];
        const skeletonBoneNames = new Set(
          skinnedMesh.skeleton.bones.map(b => b.name)
        );

        // Use the STORED bind pose (not current bone position which changes during animation)
        const bindHP = originalBindHipsPos;
        console.log('Using stored bind Hips:', bindHP);

        for (const t of srcClip.tracks) {
          const parts = t.name.split('.');
          const prop = parts.pop();
          const bonePath = parts.join('.');
          const boneName = bonePath.split('/').pop();

          if (!skeletonBoneNames.has(boneName)) continue;

          const nt = t.clone();
          nt.name = boneName + '.' + prop;

          if (prop === 'quaternion') {
            tracks.push(nt);
          } else if (prop === 'position' && boneName === 'mixamorigHips') {
            // Offset ALL axes: anchor first frame to bind pose, preserve all motion
            const vals = nt.values;
            const offsetX = bindHP.x - vals[0];
            const offsetY = bindHP.y - vals[1];
            const offsetZ = bindHP.z - vals[2];

            console.log(`[FIX] offsets: (${offsetX.toFixed(4)}, ${offsetY.toFixed(4)}, ${offsetZ.toFixed(4)})`);

            for (let i = 0; i < vals.length; i += 3) {
              vals[i]     += offsetX;
              vals[i + 1] += offsetY;
              vals[i + 2] += offsetZ;
            }
            tracks.push(nt);
          }
          // Skip position tracks for non-Hips bones (they're static in Mixamo anims)
          // Skip scale tracks
        }

        console.log(`Animation "${name}": ${srcClip.tracks.length} src tracks → ${tracks.length} matched`);

        const clip = tracks.length > 0
          ? new THREE.AnimationClip(name, srcClip.duration, tracks)
          : srcClip;
        animClips[name] = clip;

        st('anim').textContent = `5. Anim: loaded "${name}" (${tracks.length} tracks, ${srcClip.duration.toFixed(1)}s)`;
        st('anim').className = 'st ok';

        playAnim(name, btn);
      },
      undefined,
      (err) => {
        st('anim').textContent = `5. Anim: FAILED to load "${name}"`;
        st('anim').className = 'st err';
        console.error(err);
      }
    );
  });
});

function playAnim(name, activeBtn) {
  if (!mixer || !animClips[name]) return;
  if (currentAction) currentAction.fadeOut(0.3);
  const action = mixer.clipAction(animClips[name]);
  action.reset().fadeIn(0.3).play();
  currentAction = action;
  animPaused = false;
  document.querySelectorAll('.btn.anim').forEach(b => b.classList.remove('active'));
  if (activeBtn) activeBtn.classList.add('active');
  const pauseBtn = document.getElementById('btn-pause');
  pauseBtn.style.display = 'inline-block';
  pauseBtn.textContent = '⏸ 一時停止';
  pauseBtn.style.background = '#2a5a2a';
}

let animPaused = false;
document.getElementById('btn-pause').addEventListener('click', () => {
  if (!currentAction) return;
  animPaused = !animPaused;
  currentAction.paused = animPaused;
  const btn = document.getElementById('btn-pause');
  btn.textContent = animPaused ? '▶ 再生' : '⏸ 一時停止';
  btn.style.background = animPaused ? '#5a2a2a' : '#2a5a2a';
});

// ── Debug tools ──
let normalMatActive = false;
let wireframeActive = false;
let originalMat = null;

document.getElementById('btn-normal').addEventListener('click', () => {
  if (!skinnedMesh) return;
  normalMatActive = !normalMatActive;
  if (normalMatActive) {
    originalMat = skinnedMesh.material;
    skinnedMesh.material = new THREE.MeshNormalMaterial({ side: THREE.DoubleSide, wireframe: wireframeActive });
  } else {
    skinnedMesh.material = originalMat || new THREE.MeshStandardMaterial({ color: 0x8888aa, roughness: 0.6, metalness: 0.1, side: THREE.DoubleSide });
    if (wireframeActive) skinnedMesh.material.wireframe = true;
  }
  st('debug').textContent = `Debug: normal=${normalMatActive}, wireframe=${wireframeActive}`;
});

document.getElementById('btn-wireframe').addEventListener('click', () => {
  if (!skinnedMesh) return;
  wireframeActive = !wireframeActive;
  skinnedMesh.material.wireframe = wireframeActive;
  st('debug').textContent = `Debug: normal=${normalMatActive}, wireframe=${wireframeActive}`;
});

// ── Resize ──
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ── Render ──
const _hipsWP = new THREE.Vector3();
(function animate() {
  requestAnimationFrame(animate);
  const dt = clock.getDelta();
  if (mixer) mixer.update(dt);

  // Camera follows Hips position
  if (skinnedMesh) {
    const hipsBone = skinnedMesh.skeleton.bones.find(b => b.name === 'mixamorigHips');
    if (hipsBone) {
      hipsBone.getWorldPosition(_hipsWP);
      controls.target.lerp(_hipsWP, 0.1);  // smooth follow
    }
  }

  controls.update();
  renderer.render(scene, camera);
})();
</script>
