<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Rigchecker</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&family=Space+Mono:wght@400;700&display=swap');
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{--bg:#1a1a2e;--bg2:#16213e;--surface:#222244;--surface2:#2a2a4a;--text:#e8e8f0;--text2:#9999bb;--accent:#e94560;--accent2:#ff6b6b;--green:#4ecdc4;--blue:#45b7d1;--yellow:#f9ca24;--orange:#f0932b;--purple:#a29bfe;--sans:'Noto Sans JP',sans-serif;--mono:'Space Mono',monospace}
  html,body{width:100%;height:100%;overflow:hidden}
  body{font-family:var(--sans);background:var(--bg);color:var(--text);display:flex;flex-direction:column}
  .hdr{height:48px;background:var(--bg2);border-bottom:1px solid rgba(255,255,255,.08);display:flex;align-items:center;padding:0 16px;gap:12px;flex-shrink:0;z-index:100}
  .logo{font-family:var(--mono);font-size:16px;font-weight:700;color:var(--accent);letter-spacing:.05em}
  .logo span{color:var(--text2);font-weight:400;font-size:11px;margin-left:6px}
  .dots{display:flex;gap:4px;margin-left:auto}
  .dot{width:28px;height:6px;border-radius:3px;background:var(--surface2);transition:background .3s}
  .dot.on{background:var(--accent)}.dot.done{background:var(--green)}
  .main{flex:1;display:flex;position:relative;overflow:hidden}
  #cv{flex:1;position:relative}
  #cv canvas{display:block;width:100%!important;height:100%!important}
  .scr{position:absolute;inset:0;display:none;z-index:10;flex-direction:column;align-items:center;justify-content:center;background:var(--bg)}
  .scr.on{display:flex}
  .sb{width:260px;background:var(--bg2);border-left:1px solid rgba(255,255,255,.08);display:none;flex-direction:column;flex-shrink:0;overflow-y:auto}
  .sb.on{display:flex}
  .sb-t{font-family:var(--mono);font-size:13px;font-weight:700;letter-spacing:.08em;padding:16px 16px 8px;color:var(--text2);text-transform:uppercase}
  .sb-d{font-size:12px;color:var(--text2);padding:0 16px 12px;line-height:1.6}
  .upl{width:340px;max-width:90%;padding:48px 32px;border:2px dashed rgba(255,255,255,.15);border-radius:16px;text-align:center;cursor:pointer;transition:border-color .2s,background .2s}
  .upl:hover,.upl.dg{border-color:var(--accent);background:rgba(233,69,96,.05)}
  .upl-ico{font-size:48px;margin-bottom:16px;opacity:.6}
  .upl-ttl{font-size:18px;font-weight:700;margin-bottom:8px}
  .upl-sub{font-size:13px;color:var(--text2);line-height:1.6}
  .upl-btn{display:inline-block;margin-top:20px;padding:10px 28px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;font-family:var(--sans)}
  .upl-btn:hover{background:var(--accent2)}
  #fi{display:none}
  .mk-list{padding:0 12px;display:flex;flex-direction:column;gap:4px}
  .mk{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;font-size:13px;font-weight:700;font-family:var(--mono);transition:background .2s}
  .mk.cur{background:rgba(233,69,96,.15);outline:1px solid rgba(233,69,96,.3)}
  .mk.done{opacity:.5}
  .mk-dot{width:18px;height:18px;border-radius:50%;border:2.5px solid currentColor;flex-shrink:0;display:flex;align-items:center;justify-content:center}
  .mk-dot.filled::after{content:'';width:8px;height:8px;border-radius:50%;background:currentColor}
  .mk-st{margin-left:auto;font-size:10px;font-weight:400;color:var(--text2)}
  .c-chin{color:var(--blue)}.c-wri{color:var(--yellow)}.c-elb{color:var(--orange)}.c-kne{color:var(--purple)}.c-gro{color:var(--accent)}
  .sym{display:flex;align-items:center;gap:8px;padding:12px 16px;font-size:12px;border-top:1px solid rgba(255,255,255,.06);margin-top:8px}
  .sym input{accent-color:var(--green);width:16px;height:16px}
  .btw{padding:12px 16px;margin-top:auto}
  .btn-main{width:100%;padding:14px;background:var(--accent);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;font-family:var(--sans);cursor:pointer}
  .btn-main:hover{background:var(--accent2)}.btn-main:disabled{background:var(--surface2);color:var(--text2);cursor:not-allowed}
  .btn-back{width:100%;padding:8px 16px;margin-bottom:8px;background:none;border:1px solid rgba(255,255,255,.15);color:var(--text2);border-radius:6px;font-size:12px;font-family:var(--sans);cursor:pointer}
  .btn-back:hover{border-color:rgba(255,255,255,.3);color:var(--text)}
  .ag{padding:8px 12px;display:flex;flex-direction:column;gap:4px}
  .ab{width:100%;padding:12px 14px;background:var(--surface);border:1px solid rgba(255,255,255,.08);color:var(--text);border-radius:8px;font-size:13px;font-weight:700;font-family:var(--sans);cursor:pointer;text-align:left;transition:background .2s,border-color .2s}
  .ab:hover{background:var(--surface2);border-color:rgba(255,255,255,.15)}
  .ab.on{background:rgba(233,69,96,.15);border-color:var(--accent);color:var(--accent2)}
  .ab .an{display:block}.ab .as{display:block;font-size:10px;font-weight:400;color:var(--text2);margin-top:2px}
  .btn-pause{width:100%;padding:10px;background:#2a5a2a;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:700;font-family:var(--sans);cursor:pointer;margin-bottom:8px;display:none}
  .ld{position:absolute;inset:0;background:rgba(26,26,46,.92);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:50}
  .ld.on{display:flex}
  .sp{width:48px;height:48px;border:3px solid var(--surface2);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .ld-t{margin-top:16px;font-size:14px;color:var(--text2)}
  .guide{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.7);padding:10px 24px;border-radius:10px;font-size:14px;font-weight:700;color:var(--text);pointer-events:none;z-index:20;white-space:nowrap;display:none}
  .guide.on{display:block}
  .stat{height:28px;background:var(--bg2);border-top:1px solid rgba(255,255,255,.06);display:flex;align-items:center;padding:0 16px;font-family:var(--mono);font-size:10px;color:var(--text2);flex-shrink:0;gap:16px}
  @media(max-width:600px){.sb{position:absolute;right:0;top:0;bottom:0;width:260px;z-index:30;box-shadow:-4px 0 20px rgba(0,0,0,.4)}}
</style>
</head>
<body>
<div class="hdr"><div class="logo">RIGCHECKER <span>v1.0</span></div><div class="dots"><div class="dot on" id="d0"></div><div class="dot" id="d1"></div><div class="dot" id="d2"></div></div></div>
<div class="main">
  <div id="cv"></div>
  <div class="guide" id="guide"></div>
  <div class="scr on" id="s-upload">
    <div class="upl" id="upl"><div class="upl-ico">📦</div><div class="upl-ttl">3Dモデルをアップロード</div><div class="upl-sub">Nomad Sculpt で作った FBX ファイルを<br>選択またはドラッグ＆ドロップ</div><button class="upl-btn" id="upl-btn">ファイルを選択</button><input type="file" id="fi" accept=".fbx,.glb"></div>
    <div style="margin-top:16px;font-family:var(--mono);font-size:10px;color:var(--text2)" id="ref-st">リファレンス骨格を読み込み中...</div>
  </div>
  <div class="sb" id="sb-mk"><div class="sb-t">Markers</div><div class="sb-d">モデル上の5箇所をタップして位置を教えてください。</div>
    <div class="mk-list" id="mk-list">
      <div class="mk cur c-chin" data-k="chin"><div class="mk-dot"></div><span>CHIN</span><span class="mk-st">— タップ</span></div>
      <div class="mk c-wri" data-k="wrists"><div class="mk-dot"></div><span>WRISTS</span><span class="mk-st"></span></div>
      <div class="mk c-elb" data-k="elbows"><div class="mk-dot"></div><span>ELBOWS</span><span class="mk-st"></span></div>
      <div class="mk c-kne" data-k="knees"><div class="mk-dot"></div><span>KNEES</span><span class="mk-st"></span></div>
      <div class="mk c-gro" data-k="groin"><div class="mk-dot"></div><span>GROIN</span><span class="mk-st"></span></div>
    </div>
    <div class="sym"><input type="checkbox" id="sym" checked><label for="sym">Use Symmetry</label></div>
    <div class="btw"><button class="btn-back" id="b-back1">BACK</button><button class="btn-main" id="b-rig" disabled>リグ生成</button></div>
  </div>
  <div class="sb" id="sb-an"><div class="sb-t">Animations</div><div class="sb-d">アニメーションを選んでプレビュー</div>
    <div class="ag" id="ag">
      <button class="ab" data-a="Breathing Idle"><span class="an">Idle</span><span class="as">待機ポーズ</span></button>
      <button class="ab" data-a="Shopping Cart Dance"><span class="an">Shopping Cart</span><span class="as">ショッピングカートダンス</span></button>
      <button class="ab" data-a="Northern Soul Spin Combo"><span class="an">Spin Combo</span><span class="as">スピンコンボダンス</span></button>
      <button class="ab" data-a="Walking"><span class="an">Walk</span><span class="as">歩行</span></button>
      <button class="ab" data-a="Standing Jump"><span class="an">Jump</span><span class="as">ジャンプ</span></button>
      <button class="ab" data-a="Waving"><span class="an">Wave</span><span class="as">手振り</span></button>
    </div>
    <div class="btw"><button class="btn-pause" id="b-pause">⏸ 一時停止</button><button class="btn-back" id="b-back2">BACK</button></div>
  </div>
  <div class="ld" id="ld"><div class="sp"></div><div class="ld-t" id="ld-t">読み込み中...</div></div>
</div>
<div class="stat"><div id="st-poly">ポリゴン: —</div><div id="st-bones">ボーン: —</div><div id="st-step">ステップ: 起動中</div></div>
<script type="importmap">
{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"}}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { FBXLoader } from 'three/addons/loaders/FBXLoader.js';
// FBX Patch
const _op=FBXLoader.prototype.parse;FBXLoader.prototype.parse=function(buf,path){try{return _op.call(this,buf,path)}catch(e){if(e.message?.includes('MappingInformationType')){const b=new Uint8Array(buf instanceof ArrayBuffer?buf:buf.buffer||buf);const n=[76,97,121,101,114,69,108,101,109,101,110,116,67,111,108,111,114];for(let i=0;i<b.length-n.length;i++){let m=true;for(let j=0;j<n.length;j++){if(b[i+j]!==n[j]){m=false;break}}if(m)b[i+12]=88}return _op.call(this,b.buffer,path)}throw e}};
// Scene
const cv=document.getElementById('cv'),renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));renderer.setClearColor(0x1a1a2e);cv.appendChild(renderer.domElement);
const scene=new THREE.Scene();
const perspCam=new THREE.PerspectiveCamera(50,1,0.01,100);perspCam.position.set(0,1.2,3);
const orthoCam=new THREE.OrthographicCamera(-2,2,2,-2,0.01,100);orthoCam.position.set(0,1,5);
let camera=perspCam;
let controls=new OrbitControls(camera,renderer.domElement);controls.enableDamping=true;controls.dampingFactor=0.08;controls.target.set(0,0.8,0);controls.enabled=false;
function switchCam(type){const tgt=controls.target.clone();controls.dispose();camera=type==='ortho'?orthoCam:perspCam;controls=new OrbitControls(camera,renderer.domElement);controls.enableDamping=true;controls.dampingFactor=0.08;controls.target.copy(tgt);controls.enabled=true;if(type==='ortho'){controls.enableRotate=false;controls.mouseButtons={LEFT:THREE.MOUSE.PAN,MIDDLE:THREE.MOUSE.DOLLY,RIGHT:THREE.MOUSE.PAN};controls.touches={ONE:THREE.TOUCH.PAN,TWO:THREE.TOUCH.DOLLY_PAN}}onResize();controls.update()}
scene.add(new THREE.AmbientLight(0x404060,1.5));scene.add(new THREE.DirectionalLight(0xffffff,2).translateX(3).translateY(5).translateZ(4));scene.add(new THREE.DirectionalLight(0x4488cc,0.6).translateX(-3).translateY(2).translateZ(-2));scene.add(new THREE.GridHelper(6,12,0x333355,0x222244));
const raycaster=new THREE.Raycaster(),pointer=new THREE.Vector2(),clock=new THREE.Clock();
function onResize(){const w=cv.clientWidth,h=cv.clientHeight;if(camera.isPerspectiveCamera){camera.aspect=w/h}else{const a=w/h,fh=camera.top-camera.bottom;camera.left=-fh*a/2;camera.right=fh*a/2}camera.updateProjectionMatrix();renderer.setSize(w,h)}
window.addEventListener('resize',onResize);
// State
let refData=null,userModel=null,userMeshes=[],skinnedMesh=null,skelHelper=null,mixer=null,currentAction=null,fitScale=1,fitYOffset=0,originalBindHipsPos=new THREE.Vector3(0,1,0),animPaused=false,step='upload';
const animClips={};
const MK_ORDER=['chin','wrists','elbows','knees','groin'];
const MK_COLORS={chin:0x45b7d1,wrists:0xf9ca24,elbows:0xf0932b,knees:0xa29bfe,groin:0xe94560};
const MK_GUIDES={chin:'あご をタップ',wrists:'手首 をタップ（片側）',elbows:'ひじ をタップ（片側）',knees:'ひざ をタップ（片側）',groin:'股間 をタップ'};
let mkStep=0,markers={},mkSpheres=[],useSym=true;
// UI
const $=id=>document.getElementById(id);
function showLoad(t){$('ld-t').textContent=t;$('ld').classList.add('on')}
function hideLoad(){$('ld').classList.remove('on')}
function showGuide(t){$('guide').textContent=t;$('guide').classList.add('on')}
function hideGuide(){$('guide').classList.remove('on')}
function setSt(k,v){const el=$('st-'+k);if(el)el.textContent=el.textContent.split(':')[0]+': '+v}
function goStep(s){
  step=s;const steps=['upload','markers','animate'],idx=steps.indexOf(s);
  steps.forEach((st,i)=>{const d=$('d'+i);d.className='dot';if(i<idx)d.classList.add('done');if(i===idx)d.classList.add('on')});
  $('s-upload').classList.remove('on');$('sb-mk').classList.remove('on');$('sb-an').classList.remove('on');hideGuide();
  if(s==='upload'){$('s-upload').classList.add('on');controls.enabled=false;setSt('step','アップロード待ち')}
  if(s==='markers'){$('sb-mk').classList.add('on');resetMarkers();const box=new THREE.Box3().setFromObject(userModel),sz=box.getSize(new THREE.Vector3()),ctr=box.getCenter(new THREE.Vector3()),h=sz.y;orthoCam.top=h*1.2/2;orthoCam.bottom=-h*1.2/2;orthoCam.position.set(0,ctr.y,h*2);switchCam('ortho');controls.target.set(0,ctr.y,0);controls.update();showGuide(MK_GUIDES[MK_ORDER[0]]);setSt('step','マーカー配置')}
  if(s==='animate'){$('sb-an').classList.add('on');const box=new THREE.Box3().setFromObject(skinnedMesh||userModel),ctr=box.getCenter(new THREE.Vector3()),sz=box.getSize(new THREE.Vector3());perspCam.position.set(0,ctr.y,sz.y*1.5);switchCam('persp');controls.target.set(0,ctr.y,0);controls.update();setSt('step','アニメーション再生')}
  onResize();
}
// Reference skeleton
new FBXLoader().load('T-Pose.fbx',(obj)=>{obj.updateMatrixWorld(true);const bones=[],seen=new Set();obj.traverse(c=>{if(c.isBone){const wp=new THREE.Vector3();c.getWorldPosition(wp);const key=c.name+'|'+wp.x.toFixed(1)+'|'+wp.y.toFixed(1)+'|'+wp.z.toFixed(1);if(!seen.has(key)){seen.add(key);bones.push(c)}}});const rootBone=bones.find(b=>!b.parent?.isBone);let minY=Infinity,maxY=-Infinity;bones.forEach(b=>{const wp=new THREE.Vector3();b.getWorldPosition(wp);if(wp.y<minY)minY=wp.y;if(wp.y>maxY)maxY=wp.y});const hipsWP=new THREE.Vector3();rootBone.getWorldPosition(hipsWP);refData={object:obj,bones,rootBone,totalHeight:maxY-minY,minY,maxY,hipsY:hipsWP.y};$('ref-st').textContent='リファレンス骨格: OK ('+bones.length+' bones)';$('ref-st').style.color='#4ecdc4'},undefined,()=>{$('ref-st').textContent='リファレンス骨格の読み込みに失敗';$('ref-st').style.color='#ff6b6b'});
// Upload
$('upl-btn').addEventListener('click',e=>{e.stopPropagation();$('fi').click()});
$('upl').addEventListener('click',()=>$('fi').click());
$('upl').addEventListener('dragover',e=>{e.preventDefault();$('upl').classList.add('dg')});
$('upl').addEventListener('dragleave',()=>$('upl').classList.remove('dg'));
$('upl').addEventListener('drop',e=>{e.preventDefault();$('upl').classList.remove('dg');if(e.dataTransfer.files.length)loadModel(e.dataTransfer.files[0])});
$('fi').addEventListener('change',()=>{if($('fi').files.length)loadModel($('fi').files[0])});
function loadModel(file){showLoad('モデルを読み込み中...');const reader=new FileReader();reader.onload=e=>{try{const obj=new FBXLoader().parse(e.target.result);if(userModel)scene.remove(userModel);userModel=obj;userMeshes=[];const box=new THREE.Box3().setFromObject(obj),sz=box.getSize(new THREE.Vector3()),scale=2.0/Math.max(sz.x,sz.y,sz.z);obj.scale.multiplyScalar(scale);box.setFromObject(obj);const ctr=box.getCenter(new THREE.Vector3());obj.position.sub(ctr);box.setFromObject(obj);obj.position.y-=box.min.y;let pc=0;obj.traverse(c=>{if(c.isMesh){userMeshes.push(c);if(!c.geometry.attributes.normal)c.geometry.computeVertexNormals();c.material=new THREE.MeshStandardMaterial({color:0x8888aa,roughness:0.6,metalness:0.1,side:THREE.DoubleSide});const idx=c.geometry.index;pc+=idx?idx.count/3:c.geometry.attributes.position.count/3}});scene.add(obj);setSt('poly',Math.round(pc).toLocaleString());hideLoad();goStep('markers')}catch(err){hideLoad();alert('読み込みに失敗:\n'+err.message);console.error(err)}};reader.readAsArrayBuffer(file)}
// Markers
function resetMarkers(){mkStep=0;markers={};mkSpheres.forEach(s=>scene.remove(s));mkSpheres=[];updateMarkerUI();$('b-rig').disabled=true}
function updateMarkerUI(){const cur=MK_ORDER[mkStep];document.querySelectorAll('.mk').forEach(el=>{const k=el.dataset.k,dot=el.querySelector('.mk-dot'),st=el.querySelector('.mk-st');el.classList.remove('cur','done');dot.classList.remove('filled');if(k===cur&&mkStep<MK_ORDER.length){el.classList.add('cur');st.textContent='— タップ'}const placed=k==='chin'||k==='groin'?markers[k]:markers[k+'_l'];if(placed){el.classList.add('done');dot.classList.add('filled');st.textContent='✓'}})}
function addMkSphere(pos,col){const s=new THREE.Mesh(new THREE.SphereGeometry(0.03,12,12),new THREE.MeshBasicMaterial({color:col,depthTest:false}));s.position.copy(pos);s.renderOrder=999;scene.add(s);mkSpheres.push(s)}
function onTap(e){if(step!=='markers'||mkStep>=MK_ORDER.length||!userMeshes.length)return;const rect=renderer.domElement.getBoundingClientRect();pointer.x=((e.clientX-rect.left)/rect.width)*2-1;pointer.y=-((e.clientY-rect.top)/rect.height)*2+1;raycaster.setFromCamera(pointer,camera);const hits=raycaster.intersectObjects(userMeshes,true);if(!hits.length)return;const pt=hits[0].point,key=MK_ORDER[mkStep],col=MK_COLORS[key];if(key==='chin'||key==='groin'){const snap=pt.clone();snap.x=0;markers[key]=snap;addMkSphere(snap,col)}else{markers[key+'_l']=pt.clone();addMkSphere(pt,col);if(useSym){const m=pt.clone();m.x=-m.x;markers[key+'_r']=m;addMkSphere(m,col)}}mkStep++;updateMarkerUI();if(mkStep<MK_ORDER.length)showGuide(MK_GUIDES[MK_ORDER[mkStep]]);else{showGuide('「リグ生成」をタップ');$('b-rig').disabled=!refData}}
let tapSt=null;renderer.domElement.addEventListener('pointerdown',e=>{tapSt={x:e.clientX,y:e.clientY,t:Date.now()}});renderer.domElement.addEventListener('pointerup',e=>{if(!tapSt)return;if(Math.hypot(e.clientX-tapSt.x,e.clientY-tapSt.y)<8&&Date.now()-tapSt.t<300)onTap(e);tapSt=null});
$('sym').addEventListener('change',e=>{useSym=e.target.checked});
// Rig Generation (B-plan)
$('b-rig').addEventListener('click',()=>{if(!refData||!userModel)return;showLoad('リグを生成中...');setTimeout(()=>{try{const modelBox=new THREE.Box3().setFromObject(userModel),modelH=modelBox.getSize(new THREE.Vector3()).y;
// ── MARKER-BASED FITTING ──
// Compute reference Hips-to-Head distance (cm)
let refHeadY=refData.hipsY,refHipsY=refData.hipsY;
refData.bones.forEach(b=>{if(b.name==='mixamorigHead'){const wp=new THREE.Vector3();b.getWorldPosition(wp);refHeadY=wp.y}});
const refSpineH=refHeadY-refHipsY; // reference chin-to-groin in cm
// User's chin-to-groin from markers (normalized coords)
const userSpineH=markers.chin?markers.chin.y-(markers.groin?markers.groin.y:0):modelH*0.5;
fitScale=userSpineH/refSpineH;
console.log('[FIT] marker-based: userSpineH='+userSpineH.toFixed(4)+', refSpineH='+refSpineH.toFixed(2)+', fitScale='+fitScale.toFixed(6));
// Clone and scale skeleton
const clonedRoot=refData.rootBone.clone(true);clonedRoot.position.multiplyScalar(fitScale);clonedRoot.traverse(c=>{if(c.isBone&&c!==clonedRoot)c.position.multiplyScalar(fitScale)});
// Position Hips at groin marker
const groinY=markers.groin?markers.groin.y:modelH*0.45;
